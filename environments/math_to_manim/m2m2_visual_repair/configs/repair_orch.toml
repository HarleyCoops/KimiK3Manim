# NOTE (2026-07-17): aligned to the train/infer model (was Qwen/Qwen3.5-35B-A3B,
# which did not match repair_train.toml). prime-rl 0.7 renames
# rollouts_per_example -> group_size and prefers single-file rl.toml configs;
# regenerate against `uv run rl --help` before launch.
batch_size = 128
rollouts_per_example = 8
seq_len = 8192
max_steps = 300
max_concurrent = 32
mask_truncated_completions = false
zero_truncated_completions = true

[model]
name = "Qwen/Qwen3-30B-A3B-Instruct-2507"

[sampling]
max_tokens = 4096

[[env]]
id = "harleycooper/math-to-manim"

[wandb]
project = "math-to-manim-visual-repair"
name = "m2m2-repair-orchestrator"
